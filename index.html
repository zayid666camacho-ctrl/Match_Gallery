<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH GALLERY</title>
    <link rel="stylesheet" href = "css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <img src="img/logo/logo.jpg" alt="Match Gallery">
            </a>

            <div class="header-title">
                <h1>FIFA World Cup 2026</h1>
                <p>Match Gallery</p>
            </div>
        </div>
    </header>

    <div class="menu-container">
        <nav class="menu-principal">
            <ul>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Editorial</a></li>
                <li><a href="#">Vídeos</a></li>
                <li><a href="#">Música</a></li>
                <li><a href="#">Colecciones</a></li>
            </ul>
        </nav>

        <nav class="submenu">
            <ul>
                <li><a href="#">Todo</a></li>
                <li><a href="#">Noticias</a></li>
                <li><a href="#">Deportes</a></li>
                <li><a href="#">Espectáculos</a></li>
                <li><a href="#">Archivo</a></li>
            </ul>
        </nav>
    </div>

    <section class="banner" id="banner">
        <button class="banner-arrow banner-arrow-left" id="prevBtn" aria-label="Anterior">&#8249;</button>

        <div class="banner-overlay">
        <h1 class="banner-title">Cobertura completa de los partidos del Mundial</h1>
        <p class="banner-subtitle">Cada partido. Cada imagen. Revive la acción.</p>
        <a href="#galerias" class="banner-btn">Ver Partidos</a>
        </div>

        <button class="banner-arrow banner-arrow-right" id="nextBtn" aria-label="Siguiente">&#8250;</button>

        <div class="banner-dots" id="bannerDots"></div>
    </section>

    <footer>



    </footer>

    <script src="js/banner.js"></script>
