<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH GALLERY</title>
    <link rel="stylesheet" href = "css/style.css">
</head>
<body>
    <header>

    <div class="logo">
        <a href="index.html">
            <img src="img/logo/logo.jpg" alt="MatchGallery">
        </a>
    </div>

    </header>

    <nav>



    </nav>

    <div class="menu-container">
    <nav class="navegacion">

        <!-- Inputs radio ocultos -->
        <input type="radio" name="menu" id="nosotros" class="radio-menu">
        <input type="radio" name="menu" id="partidos" class="radio-menu" checked>
        <input type="radio" name="menu" id="colecciones" class="radio-menu">
        <input type="radio" name="menu" id="jugadores" class="radio-menu">

        <!-- Fila superior: menú a la izquierda, buscador a la derecha -->
        <div class="fila-superior">
            <ul class="menu-principal">
                <li><label for="nosotros">Nosotros</label></li>
                <li><label for="partidos">Partidos</label></li>
                <li><label for="colecciones">Colecciones</label></li>
                <li><label for="jugadores">Jugadores</label></li>
            </ul>

            <!-- Buscador -->
            <form class="buscador" onsubmit="return false;">
                <input type="text" placeholder="Busca las mejores fotos..." class="input-busqueda">
                <button type="submit" class="btn-buscar">🔍</button>
            </form>
        </div>

        <!-- Submenús -->
        <ul class="submenu" id="submenu-nosotros">
            <li><a href="#">Quiénes somos</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

        <ul class="submenu" id="submenu-colecciones">
            <li><a href="#">Destacadas</a></li>
            <li><a href="#">Recientes</a></li>
        </ul>
    </nav>
</div>

<section class="banner" id="banner">
    <button class="banner-arrow banner-arrow-left" id="prevBtn" aria-label="Anterior">&#8249;</button>

    <div class="banner-overlay">
    <h1 class="banner-title">Cobertura completa de los partidos del Mundial</h1>
    <p class="banner-subtitle">Cada partido. Cada imagen. Revive la acción.</p>
    <a href="#galerias" class="banner-btn">Ver Partidos</a>
    </div>

    <button class="banner-arrow banner-arrow-right" id="nextBtn" aria-label="Siguiente">&#8250;</button>

    <div class="banner-dots" id="bannerDots"></div>
</section>

    <footer>



    </footer>

    <script src="js/banner.js"></script>
</body>
</html>
